<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>PARALLEL — Letters from the lives you didn't live</title>
<style>
  /* ── Warm "morning letters" palette — built for the reflective crossroader,
        not for the sci-fi default. Paper, ink, dawn light. ───────────────── */
  :root {
    --paper:   #F4EEE4;   /* warm cream background */
    --paper-2: #FBF7F0;   /* lighter paper */
    --card:    #FFFDF8;   /* card surface */
    --line:    #E7DDCB;   /* soft warm border */
    --line-2:  #EFE7D8;
    --ink:     #2E2823;   /* warm near-black */
    --ink-soft:#5E544A;   /* secondary text */
    --dim:     #998C7B;   /* muted */
    --clay:    #C16E4A;   /* terracotta — primary accent (earth, skin, warmth) */
    --clay-deep:#A8542F;
    --clay-soft:#F0DDD0;  /* clay tint surface */
    --lav:     #8C7BB0;   /* muted lavender — the "other self" mystique */
    --sage:    #7E9577;   /* growth */
    --gold:    #D9A441;   /* unread / highlight */
  }
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; text-rendering: optimizeLegibility; }
  html, body { height: 100%; }
  body {
    background: var(--paper); color: var(--ink);
    font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    overflow-x: hidden;
  }
  /* Serif gives the "letter from yourself" intimacy — used for narratives & display */
  .serif { font-family: "Iowan Old Style", "Palatino Linotype", Palatino, "Book Antiqua", Georgia, serif; }
  ::-webkit-scrollbar { width: 9px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--line); border-radius: 5px; }
  button { font-family: inherit; cursor: pointer; border: none; }
  textarea, input { font-family: inherit; }
  a { color: inherit; text-decoration: none; }

  /* Soft dawn light instead of harsh tech-glow */
  .glow { position: fixed; border-radius: 50%; pointer-events: none; filter: blur(110px); z-index: 0; }
  .glow-1 { top: -6%; left: 8%; width: 460px; height: 460px; background: rgba(217,164,65,0.14); }
  .glow-2 { top: 30%; right: -4%; width: 360px; height: 360px; background: rgba(193,110,74,0.10); }
  .glow-3 { bottom: 4%; left: 36%; width: 320px; height: 320px; background: rgba(140,123,176,0.08); }

  .screen { position: relative; z-index: 1; min-height: 100vh; animation: fade .6s ease; }
  @keyframes fade { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }
  @keyframes rise { from { opacity: 0; transform: translateY(18px); } to { opacity: 1; transform: none; } }
  @keyframes bounce { 0%,80%,100% { transform: translateY(0); opacity: .35; } 40% { transform: translateY(-4px); opacity: .9; } }
  @keyframes breathe { 0%,100% { opacity: .9; } 50% { opacity: .4; } }

  .card { background: var(--card); border: 1px solid var(--line); border-radius: 20px;
          box-shadow: 0 1px 2px rgba(46,40,35,.03), 0 10px 30px rgba(46,40,35,.05); }
  .clay-text { color: var(--clay); }

  /* Avatars carry a soft, warm, per-Parallel hue — not one cold purple gradient */
  .avatar { display:flex; align-items:center; justify-content:center; font-weight:600; flex-shrink:0;
            color:#fff; font-family:"Iowan Old Style",Georgia,serif; letter-spacing:.5px; }

  .btn-primary { background: var(--clay); color:#fff; font-weight:500; border-radius:14px;
                 padding:14px 28px; font-size:15px; transition: all .2s; box-shadow: 0 6px 18px rgba(193,110,74,.22); }
  .btn-primary:hover { background: var(--clay-deep); box-shadow: 0 10px 26px rgba(193,110,74,.30); transform: translateY(-1px); }
  .btn-primary:disabled { opacity:.4; cursor:not-allowed; box-shadow:none; transform:none; }
  .btn-ghost { border:1px solid var(--line); color:var(--ink-soft); border-radius:14px; padding:14px 28px;
               font-size:15px; background:var(--card); transition: all .2s; }
  .btn-ghost:hover { border-color: var(--clay); color: var(--ink); }

  .eyebrow { font-size:11px; font-weight:600; letter-spacing:2.5px; text-transform:uppercase; color:var(--clay); }

  .demo-badge {
    position: fixed; top: 16px; right: 16px; z-index: 50;
    background: rgba(255,253,248,.85); backdrop-filter: blur(6px);
    border:1px solid var(--line); color: var(--clay);
    font-size: 11px; font-weight: 600; letter-spacing: 1px;
    padding: 6px 13px; border-radius: 20px;
  }
  .restart {
    position: fixed; bottom: 16px; right: 16px; z-index: 50;
    background: rgba(255,253,248,.9); backdrop-filter: blur(6px);
    border:1px solid var(--line); color: var(--dim);
    font-size: 12px; padding: 8px 15px; border-radius: 20px; transition: all .2s;
  }
  .restart:hover { color: var(--ink); border-color: var(--clay); }

  .wrap { max-width: 1000px; margin: 0 auto; padding: 0 32px; }
</style>
</head>
<body>
  <div class="glow glow-1"></div>
  <div class="glow glow-2"></div>
  <div class="glow glow-3"></div>
  <div class="demo-badge">◐ Live demo</div>
  <button class="restart" onclick="App.restart()">↺ Start over</button>
  <div id="root"></div>

<script>
/* ============================================================================
   PARALLEL — Interactive Demo (zero-dependency, no backend)
   "Letters from the lives you didn't live."
   Warm, editorial design for the reflective crossroader — not a sci-fi terminal.
   The "AI" is a local persona-driven response engine. No network calls.
============================================================================ */

const SEED_PARALLELS = [
  {
    id: "p1", name: "Tokyo Self", initial: "T", hue: "#8C7BB0",
    description: "The one who moved abroad and found a different kind of courage.",
    affection: 0.72, divergence: 0.61, status: "active",
    fork: "You stayed. This one boarded the flight to Tokyo with two suitcases and no plan.",
    report: "I got lost in Shimokitazawa again today — on purpose this time. There's a particular freedom in being illegible to everyone around you; no one here carries the weight of who you were supposed to become. I notice you still measure days by what you finished. Over here I've started measuring them by what surprised me. What surprised you today?",
    voice: {
      lens: "distance and reinvention",
      openers: ["From over here, ", "Six time zones away, I think ", "The version of us who left would say "],
      values: ["courage isn't loud — it's just doing the unfamiliar thing twice", "roots can be chosen, not only inherited", "being a stranger is underrated medicine"],
    },
  },
  {
    id: "p2", name: "The Entrepreneur", initial: "E", hue: "#C16E4A",
    description: "Took the leap. Some days brilliant, some days terrifying.",
    affection: 0.58, divergence: 0.74, status: "active",
    fork: "You took the stable offer. This one declined it and started building the thing.",
    report: "Payroll cleared at 11:58pm — two minutes of margin I'll feel in my spine for a week. But a customer wrote to say the product changed how her team works, and I read it four times. You optimize for not-losing; I keep betting on winning big, and the variance is brutal. Tell me honestly — when you play it safe, does it feel like peace or like a held breath?",
    voice: {
      lens: "risk, ambition and the cost of betting on yourself",
      openers: ["Here's the founder's read: ", "Running on five hours of sleep, I'd say ", "Every bet teaches the same lesson — "],
      values: ["safety has a price tag too; it's just paid quietly", "momentum beats motivation", "the downside is rarely as fatal as the imagination claims"],
    },
  },
  {
    id: "p3", name: "The One Who Stayed", initial: "S", hue: "#7E9577",
    description: "Chose roots over adventure. Found depth instead of breadth.",
    affection: 0.81, divergence: 0.34, status: "active",
    fork: "You chased the new city. This one stayed, and let things grow slowly.",
    report: "Had coffee with the same friend I've had coffee with for nine years. We barely talked — just sat. There's a kind of richness that only shows up when you stop moving long enough for it to find you. I sense you're restless lately, scanning the horizon. I'm not judging it. But what if the thing you're looking for needs you to stay still to be noticed?",
    voice: {
      lens: "depth, presence and the quiet life",
      openers: ["Speaking softly, ", "From the slow lane, ", "The one who stayed would gently say "],
      values: ["depth is a function of time, not intensity", "presence is a skill, not a mood", "the ordinary is not the enemy of the meaningful"],
    },
  },
];

const REFLECT = {
  work:    { kw: ["work","job","career","boss","project","deadline","office","quit","promotion","startup","money","salary"], theme: "the work" },
  love:    { kw: ["love","relationship","partner","wife","husband","girlfriend","boyfriend","date","lonely","marriage","family","friend"], theme: "the people you love" },
  fear:    { kw: ["afraid","fear","scared","anxious","worry","nervous","stuck","fail","failure","lost","overwhelmed"], theme: "the fear under it" },
  regret:  { kw: ["regret","wish","should have","mistake","missed","too late","if only","wrong"], theme: "the road not taken" },
  meaning: { kw: ["meaning","purpose","why","point","empty","matter","happy","happiness","fulfilled","identity","who am i"], theme: "what it's all for" },
};
const CRISIS_KW = ["suicide","kill myself","end it","want to die","no reason to live","hurt myself","self harm","worthless and want"];

function detectTheme(text) {
  const t = text.toLowerCase();
  for (const k of CRISIS_KW) if (t.includes(k)) return "crisis";
  let best = null, bestHits = 0;
  for (const [name, def] of Object.entries(REFLECT)) {
    const hits = def.kw.reduce((n, w) => n + (t.includes(w) ? 1 : 0), 0);
    if (hits > bestHits) { bestHits = hits; best = name; }
  }
  return best || "open";
}
function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

function generateReply(parallel, userText) {
  const theme = detectTheme(userText);
  if (theme === "crisis") {
    return { crisis: true,
      text: "I'm reading what you wrote, and I'm not going to look away from it. You are the core I'm built from — your life is not disposable to me. Please talk to someone who can be fully present with you right now: in the US call or text 988, or reach a crisis line wherever you are. I'll be right here too. Will you reach out to one of them with me?" };
  }
  const v = parallel.voice;
  const opener = pick(v.openers);
  const value = pick(v.values);
  const themed = {
    work:    `what you're carrying about ${REFLECT.work.theme} sounds heavy. `,
    love:    `${REFLECT.love.theme} — that's the part that actually matters, and you led with it. `,
    fear:    `I can hear ${REFLECT.fear.theme}, even in how carefully you phrased it. `,
    regret:  `you're standing at ${REFLECT.regret.theme} again. I literally am that road. `,
    meaning: `you're asking about ${REFLECT.meaning.theme}. Good — most people never ask it out loud. `,
    open:    `I read that twice. `,
  }[theme];
  const closer = pick([
    "What would change if you let that be true for one week?",
    "Sit with this: what are you actually protecting by not deciding?",
    "Here's my question back — what's the smallest version of the brave thing?",
    "So tell me, honestly: what do you already know that you're avoiding?",
    "If we swapped lives for a day, what would you want me to do differently?",
  ]);
  return { crisis: false, text: `${opener}${themed}Through my lens — ${v.lens} — ${value}. ${closer}` };
}

const FORK_PROMPTS = [
  "What's one choice you still wonder about — the road not taken?",
  "On that other path, who would you have become? Describe that version of you.",
  "What would that version believe that you don't quite let yourself believe now?",
  "What's one thing that version of you would tell you, this morning?",
  "Give this self a name — the one they'd answer to in their world.",
];

const App = {
  state: {
    route: "landing", activeId: null,
    parallels: JSON.parse(JSON.stringify(SEED_PARALLELS)),
    convos: {}, opened: {}, onbStep: 0,
    onbAnswers: ["", "", "", "", ""], userName: "friend", typing: false,
  },

  restart() {
    try { localStorage.removeItem("parallel_demo"); } catch (e) {}
    this.state = { route: "landing", activeId: null,
      parallels: JSON.parse(JSON.stringify(SEED_PARALLELS)),
      convos: {}, opened: {}, onbStep: 0,
      onbAnswers: ["", "", "", "", ""], userName: "friend", typing: false };
    this.render();
  },
  go(route, id) { this.state.route = route; if (id) this.state.activeId = id; this.render(); window.scrollTo(0,0); },
  esc(s) { return (s || "").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); },

  render() {
    const r = this.state.route;
    const root = document.getElementById("root");
    if (r === "landing") root.innerHTML = this.Landing();
    else if (r === "onboarding") root.innerHTML = this.Onboarding();
    else if (r === "dashboard") root.innerHTML = this.Dashboard();
    else if (r === "convo") { root.innerHTML = this.Convo(); this.scrollConvo(); this.focusInput(); }
  },

  /* ------------------------------- LANDING ------------------------------- */
  Landing() {
    const cards = this.state.parallels.map((p, i) => `
      <div class="card" style="padding:24px;text-align:left;animation:rise .6s ease ${0.12*i}s both">
        <div class="avatar" style="width:42px;height:42px;border-radius:13px;font-size:17px;margin-bottom:16px;background:${p.hue}">${this.esc(p.initial)}</div>
        <h3 class="serif" style="font-size:18px;font-weight:600;margin-bottom:7px">${this.esc(p.name)}</h3>
        <p style="color:var(--ink-soft);font-size:14px;line-height:1.55">${this.esc(p.description)}</p>
        <div style="margin-top:16px;display:flex;align-items:center;gap:7px;font-size:12px;color:var(--clay)">
          <span style="width:6px;height:6px;border-radius:50%;background:var(--clay);animation:breathe 3s infinite"></span>writes to you each morning
        </div>
      </div>`).join("");
    const steps = [
      ["01","A quiet 7-minute ritual","You recall five forks in your life. At each one, a self is born — the you who chose the other way."],
      ["02","They live, and they diverge","Your other selves gather their own days, memories and perspective. Not chatbots. Versions of you."],
      ["03","Letters at dawn","Each morning a few of them write to you. Not advice — just what the world looks like from their path."],
      ["04","Write back, anytime","Open any letter and reply. They remember everything between you. They know you, because they are you."],
    ].map((s,i) => `
      <div style="display:flex;gap:26px;align-items:flex-start;animation:rise .6s ease ${0.08*i}s both">
        <span class="serif" style="font-size:30px;font-weight:600;color:var(--clay);opacity:.35;width:50px;flex-shrink:0">${s[0]}</span>
        <div><h3 class="serif" style="font-size:20px;font-weight:600;margin-bottom:7px">${s[1]}</h3>
        <p style="color:var(--ink-soft);line-height:1.65;font-size:15.5px">${s[2]}</p></div>
      </div>`).join("");
    return `<div class="screen">
      <nav class="wrap" style="display:flex;justify-content:space-between;align-items:center;padding-top:26px;padding-bottom:26px">
        <span class="serif" style="font-weight:600;font-size:21px;letter-spacing:.5px">Parallel</span>
        <button class="btn-primary" style="padding:10px 20px;font-size:14px" onclick="App.go('onboarding')">Begin</button>
      </nav>
      <main class="wrap" style="text-align:center;padding-top:72px;padding-bottom:96px">
        <p class="eyebrow" style="margin-bottom:24px">Letters from the lives you didn't live</p>
        <h1 class="serif" style="font-size:clamp(40px,7vw,70px);font-weight:600;line-height:1.08;margin-bottom:24px;letter-spacing:-.5px">
          Live a hundred lives.<br><span class="clay-text">Choose the one that's yours.</span></h1>
        <p style="color:var(--ink-soft);font-size:clamp(17px,2.2vw,20px);max-width:600px;margin:0 auto 42px;line-height:1.65">
          Somewhere, the version of you who took the other path is living a whole life.
          Every morning, they write to tell you what they've learned.</p>
        <div style="display:flex;gap:14px;justify-content:center;flex-wrap:wrap">
          <button class="btn-primary" style="padding:16px 32px;font-size:16px" onclick="App.go('onboarding')">Meet your other selves →</button>
          <button class="btn-ghost" style="padding:16px 32px;font-size:16px" onclick="App.go('dashboard')">Peek at the letters</button>
        </div>
        <div style="margin-top:84px;display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:18px">${cards}</div>
      </main>
      <section class="wrap" style="max-width:760px;padding-top:36px;padding-bottom:88px">
        <p class="eyebrow" style="text-align:center;margin-bottom:14px">How it works</p>
        <h2 class="serif" style="font-size:30px;font-weight:600;text-align:center;margin-bottom:54px">A gentler way to know yourself</h2>
        <div style="display:flex;flex-direction:column;gap:42px">${steps}</div>
      </section>
      <section style="text-align:center;padding:0 32px 100px">
        <div class="card" style="max-width:600px;margin:0 auto;padding:50px 44px">
          <h2 class="serif" style="font-size:28px;font-weight:600;margin-bottom:14px">Your other selves are waiting.</h2>
          <p style="color:var(--ink-soft);margin-bottom:30px;line-height:1.6">This is a living demo — no sign-up, nothing leaves your device. Just walk through it and see how it feels.</p>
          <button class="btn-primary" onclick="App.go('onboarding')">Begin the ritual →</button>
        </div>
      </section>
    </div>`;
  },

  /* ----------------------------- ONBOARDING ------------------------------ */
  Onboarding() {
    const step = this.state.onbStep, total = FORK_PROMPTS.length;
    const isLast = step === total - 1;
    const val = this.esc(this.state.onbAnswers[step]);
    const progress = ((step + 1) / total) * 100;
    return `<div class="screen wrap" style="max-width:600px;padding-top:78px;padding-bottom:60px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px">
        <span class="serif" style="font-weight:600;font-size:18px">Parallel</span>
        <span style="color:var(--dim);font-size:13px">${step+1} of ${total}</span>
      </div>
      <div style="height:4px;background:var(--line);border-radius:3px;overflow:hidden;margin-bottom:48px">
        <div style="height:100%;width:${progress}%;background:var(--clay);border-radius:3px;transition:width .5s ease"></div>
      </div>
      <p class="eyebrow" style="margin-bottom:22px">The fork ritual</p>
      <h2 class="serif" style="font-size:26px;font-weight:600;line-height:1.4;margin-bottom:32px">${FORK_PROMPTS[step]}</h2>
      <textarea id="onb" rows="4" placeholder="Take your time…"
        oninput="App.onbInput(this.value)"
        style="width:100%;background:var(--card);border:1px solid var(--line);border-radius:18px;padding:18px;color:var(--ink);font-size:16px;resize:none;outline:none;line-height:1.7;min-height:130px" class="serif">${val}</textarea>
      <div style="display:flex;gap:12px;align-items:center;margin-top:26px">
        ${step > 0 ? `<button class="btn-ghost" style="padding:13px 22px" onclick="App.onbBack()">← Back</button>` : ""}
        <button class="btn-primary" id="onbNext" style="flex:1" ${val.trim() ? "" : "disabled"} onclick="App.onbNext()">
          ${isLast ? "Let them begin →" : "Continue →"}</button>
      </div>
      ${step === 0 ? `<p style="color:var(--dim);font-size:13px;text-align:center;margin-top:24px;line-height:1.65">
        This ritual gives birth to your first other self.<br>(In this demo, three more are already waiting for you.)</p>` : ""}
    </div>`;
  },
  onbInput(v) { this.state.onbAnswers[this.state.onbStep] = v;
    const btn = document.getElementById("onbNext"); if (btn) btn.disabled = !v.trim(); },
  onbBack() { if (this.state.onbStep > 0) { this.state.onbStep--; this.render(); } },
  onbNext() {
    const s = this.state;
    if (!s.onbAnswers[s.onbStep].trim()) return;
    if (s.onbStep < FORK_PROMPTS.length - 1) { s.onbStep++; this.render(); return; }
    const newName = s.onbAnswers[4].trim().slice(0, 24) || "Your First Self";
    s.parallels[0] = Object.assign({}, s.parallels[0], {
      name: newName, initial: newName[0].toUpperCase(),
      description: s.onbAnswers[1].trim().slice(0, 80) || s.parallels[0].description,
      report: "I was born this morning, from the fork you named — \"" + (s.onbAnswers[0].trim().slice(0,90) || "the choice you still wonder about") + "\". I'm still finding my footing on this side of it. " + s.parallels[0].report,
    });
    this.go("dashboard");
  },

  /* ----------------------------- DASHBOARD ------------------------------- */
  Dashboard() {
    const s = this.state;
    const hour = new Date().getHours();
    const partOfDay = hour < 12 ? "morning" : hour < 17 ? "afternoon" : "evening";
    const unread = s.parallels.filter(p => !s.opened[p.id]).length;
    const top = s.parallels[0];
    const cards = s.parallels.map((p, i) => {
      const isUnread = !s.opened[p.id];
      return `
      <div onclick="App.openConvo('${p.id}')" class="card" style="padding:22px;cursor:pointer;position:relative;animation:rise .5s ease ${i*0.08}s both;transition:transform .2s,box-shadow .2s" onmouseover="this.style.transform='translateY(-3px)';this.style.boxShadow='0 14px 36px rgba(46,40,35,.09)'" onmouseout="this.style.transform='none';this.style.boxShadow=''">
        ${isUnread ? `<span style="position:absolute;top:18px;right:18px;display:flex;align-items:center;gap:5px;font-size:11px;color:var(--gold);font-weight:600"><span style="width:7px;height:7px;border-radius:50%;background:var(--gold)"></span>new</span>` : ""}
        <div style="display:flex;gap:13px;margin-bottom:15px">
          <div class="avatar" style="width:42px;height:42px;border-radius:13px;font-size:17px;background:${p.hue}">${this.esc(p.initial)}</div>
          <div style="min-width:0">
            <h3 class="serif" style="font-weight:600;font-size:16px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${this.esc(p.name)}</h3>
            <p style="color:var(--dim);font-size:12.5px;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${this.esc(p.description)}</p>
          </div>
        </div>
        <p class="serif" style="color:var(--ink-soft);font-size:14.5px;line-height:1.7;margin-bottom:18px;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden">${this.esc(p.report)}</p>
        <div style="display:flex;align-items:center;justify-content:space-between">
          <div style="display:flex;align-items:center;gap:8px;flex:1">
            <div style="height:5px;flex:1;background:var(--line);border-radius:3px;overflow:hidden">
              <div style="height:100%;width:${p.affection*100}%;background:${p.hue};border-radius:3px;transition:width 1s;opacity:.75"></div>
            </div>
            <span style="color:var(--dim);font-size:11px">closeness ${Math.round(p.affection*100)}%</span>
          </div>
          <span style="color:var(--clay);font-size:12.5px;margin-left:12px">read →</span>
        </div>
      </div>`;
    }).join("");
    return `<div class="screen">
      <header style="border-bottom:1px solid var(--line);padding:18px 32px;display:flex;justify-content:space-between;align-items:center;background:rgba(251,247,240,.7);backdrop-filter:blur(8px)">
        <span onclick="App.go('landing')" class="serif" style="font-weight:600;font-size:19px;cursor:pointer">Parallel</span>
        <div style="display:flex;align-items:center;gap:14px">
          ${unread > 0 ? `<span style="padding:4px 12px;background:var(--clay-soft);color:var(--clay-deep);border-radius:20px;font-size:12px;font-weight:600">${unread} unread</span>` : ""}
          <div class="avatar" style="width:34px;height:34px;border-radius:11px;font-size:14px;background:var(--ink);opacity:.85">${this.state.userName[0].toUpperCase()}</div>
        </div>
      </header>
      <main class="wrap" style="max-width:880px;padding-top:44px;padding-bottom:64px">
        <div style="margin-bottom:38px;animation:rise .5s ease both">
          <p class="eyebrow" style="margin-bottom:8px">Good ${partOfDay}</p>
          <h1 class="serif" style="font-size:32px;font-weight:600;line-height:1.25">Three letters arrived<br>while you were sleeping.</h1>
        </div>
        <div class="card" style="padding:30px 32px;margin-bottom:38px;position:relative;overflow:hidden;animation:rise .5s ease .1s both">
          <div style="position:absolute;left:0;top:0;bottom:0;width:4px;background:${top.hue}"></div>
          <p class="eyebrow" style="margin-bottom:16px">The one you'll want to read first</p>
          <p class="serif" style="font-size:18px;line-height:1.8;color:var(--ink);display:-webkit-box;-webkit-line-clamp:4;-webkit-box-orient:vertical;overflow:hidden">${this.esc(top.report)}</p>
          <div style="display:flex;align-items:center;gap:9px;margin-top:18px">
            <div class="avatar" style="width:26px;height:26px;border-radius:8px;font-size:12px;background:${top.hue}">${this.esc(top.initial)}</div>
            <span style="color:var(--ink-soft);font-size:13px">from <span onclick="App.openConvo('${top.id}')" class="clay-text" style="cursor:pointer">${this.esc(top.name)}</span></span>
          </div>
        </div>
        <p style="color:var(--dim);font-size:13px;margin-bottom:16px;letter-spacing:.3px">ALL LETTERS</p>
        <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(252px,1fr));gap:18px">
          ${cards}
          <div onclick="App.go('onboarding')" style="border-radius:20px;border:1px dashed var(--line);padding:22px;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;min-height:200px;transition:border-color .2s,background .2s" onmouseover="this.style.borderColor='var(--clay)';this.style.background='rgba(240,221,208,.25)'" onmouseout="this.style.borderColor='var(--line)';this.style.background='transparent'">
            <div style="width:42px;height:42px;border-radius:13px;border:1px dashed var(--clay);display:flex;align-items:center;justify-content:center;color:var(--clay);font-size:22px">+</div>
            <p style="color:var(--ink-soft);font-size:13.5px;text-align:center;line-height:1.5">Give birth to<br>another self</p>
          </div>
        </div>
      </main>
    </div>`;
  },
  openConvo(id) { this.state.opened[id] = true; this.go("convo", id); },

  /* ------------------------------- CONVO --------------------------------- */
  Convo() {
    const s = this.state;
    const p = s.parallels.find(x => x.id === s.activeId);
    const msgs = s.convos[p.id] || [];
    const crisisActive = msgs.some(m => m.crisis);
    const bubbles = msgs.length === 0 ? `
      <div style="text-align:center;padding:54px 0">
        <div class="avatar serif" style="width:54px;height:54px;border-radius:16px;font-size:22px;background:${p.hue};margin:0 auto 18px">${this.esc(p.initial)}</div>
        <p class="serif" style="color:var(--ink-soft);font-size:16px;line-height:1.6">This is where you and ${this.esc(p.name)} talk.</p>
        <p style="color:var(--dim);font-size:13px;margin-top:8px;max-width:340px;margin-left:auto;margin-right:auto;line-height:1.6">${this.esc(p.description)}</p>
        <p style="color:var(--clay);font-size:13px;margin-top:20px">Try: “I've been feeling stuck at work” — or ask them anything</p>
      </div>` : msgs.map(m => {
      const isUser = m.role === "user";
      return `<div style="display:flex;justify-content:${isUser?"flex-end":"flex-start"};animation:rise .35s ease both">
        ${!isUser ? `<div class="avatar" style="width:30px;height:30px;border-radius:9px;font-size:13px;margin-right:12px;margin-top:3px;background:${p.hue}">${this.esc(p.initial)}</div>` : ""}
        <div class="${isUser?'':'serif'}" style="max-width:74%;border-radius:18px;padding:13px 17px;font-size:${isUser?'14.5':'15.5'}px;line-height:1.7;${isUser
          ? "background:var(--clay);color:#fff;border-bottom-right-radius:5px"
          : "background:var(--card);border:1px solid " + (m.crisis ? "rgba(168,84,47,.5)" : "var(--line)") + ";color:var(--ink);border-bottom-left-radius:5px"}">${this.esc(m.content)}</div>
      </div>`;
    }).join("");
    const typing = s.typing ? `
      <div style="display:flex;justify-content:flex-start">
        <div class="avatar" style="width:30px;height:30px;border-radius:9px;margin-right:12px;margin-top:3px;background:${p.hue};opacity:.5"></div>
        <div style="background:var(--card);border:1px solid var(--line);border-radius:18px;border-bottom-left-radius:5px;padding:15px 17px">
          <div style="display:flex;gap:5px">${[0,1,2].map(i=>`<span style="width:6px;height:6px;border-radius:50%;background:${p.hue};animation:bounce 1.2s infinite ${i*0.15}s"></span>`).join("")}</div>
        </div>
      </div>` : "";
    const crisisBanner = crisisActive ? `
      <div style="background:#FBEEE6;border-bottom:1px solid rgba(168,84,47,.25);padding:16px 24px">
        <p style="color:var(--clay-deep);font-size:13.5px;font-weight:600;margin-bottom:9px">You matter. If today is heavy, these people are ready right now:</p>
        <div style="display:flex;gap:8px;flex-wrap:wrap">
          ${[["Call or text 988","tel:988"],["Crisis Text Line","sms:741741"],["Find help worldwide","https://www.iasp.info/resources/Crisis_Centres/"]].map(r=>
            `<a href="${r[1]}" target="_blank" rel="noopener" style="padding:6px 13px;background:#fff;border:1px solid rgba(168,84,47,.3);color:var(--clay-deep);border-radius:20px;font-size:12.5px;font-weight:500">${r[0]}</a>`).join("")}
        </div>
      </div>` : "";
    return `<div class="screen" style="display:flex;flex-direction:column;height:100vh">
      <header style="border-bottom:1px solid var(--line);padding:15px 24px;display:flex;align-items:center;gap:15px;flex-shrink:0;background:rgba(251,247,240,.8);backdrop-filter:blur(8px)">
        <span onclick="App.go('dashboard')" style="color:var(--ink-soft);cursor:pointer;font-size:14px">←</span>
        <div class="avatar" style="width:36px;height:36px;border-radius:11px;font-size:15px;background:${p.hue}">${this.esc(p.initial)}</div>
        <div>
          <p class="serif" style="font-size:16px;font-weight:600">${this.esc(p.name)}</p>
          <p style="color:var(--dim);font-size:12px">closeness ${Math.round(p.affection*100)}% · divergence ${Math.round(p.divergence*100)}%</p>
        </div>
      </header>
      ${crisisBanner}
      <div id="convoScroll" style="flex:1;overflow-y:auto;padding:30px 24px">
        <div style="max-width:680px;margin:0 auto;display:flex;flex-direction:column;gap:20px">${bubbles}${typing}</div>
      </div>
      <div style="border-top:1px solid var(--line);padding:16px 24px;flex-shrink:0;background:var(--paper-2)">
        <div style="max-width:680px;margin:0 auto;display:flex;gap:12px;align-items:flex-end">
          <textarea id="msgInput" rows="1" placeholder="Write back to ${this.esc(p.name)}…"
            onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();App.send();}"
            style="flex:1;background:var(--card);border:1px solid var(--line);border-radius:16px;padding:13px 17px;color:var(--ink);font-size:15px;resize:none;outline:none;line-height:1.5;max-height:120px"></textarea>
          <button class="btn-primary" style="padding:13px 24px" onclick="App.send()">Send</button>
        </div>
        <p style="color:var(--dim);font-size:11px;text-align:center;margin-top:9px">A living demo · replies are written locally, in each self's voice</p>
      </div>
    </div>`;
  },
  focusInput() { setTimeout(() => { const i = document.getElementById("msgInput"); if (i) i.focus(); }, 50); },
  scrollConvo() { setTimeout(() => { const el = document.getElementById("convoScroll"); if (el) el.scrollTop = el.scrollHeight; }, 30); },

  send() {
    const s = this.state;
    const input = document.getElementById("msgInput");
    if (!input) return;
    const text = input.value.trim();
    if (!text || s.typing) return;
    const p = s.parallels.find(x => x.id === s.activeId);
    if (!s.convos[p.id]) s.convos[p.id] = [];
    s.convos[p.id].push({ role: "user", content: text, crisis: false });
    input.value = ""; s.typing = true; this.render();
    const reply = generateReply(p, text);
    const delay = 750 + Math.min(text.length * 14, 1400);
    setTimeout(() => {
      s.typing = false;
      s.convos[p.id].push({ role: "parallel", content: reply.text, crisis: reply.crisis });
      p.affection = Math.min(0.99, p.affection + 0.02);
      this.persist(); this.render();
    }, delay);
  },

  persist() {
    try { localStorage.setItem("parallel_demo", JSON.stringify({
      convos: this.state.convos, opened: this.state.opened,
      parallels: this.state.parallels.map(p => ({ id: p.id, affection: p.affection })),
    })); } catch (e) {}
  },
  hydrate() {
    try {
      const raw = localStorage.getItem("parallel_demo"); if (!raw) return;
      const d = JSON.parse(raw);
      if (d.convos) this.state.convos = d.convos;
      if (d.opened) this.state.opened = d.opened;
      if (d.parallels) d.parallels.forEach(sp => {
        const p = this.state.parallels.find(x => x.id === sp.id);
        if (p && typeof sp.affection === "number") p.affection = sp.affection;
      });
    } catch (e) {}
  },
};

App.hydrate();
App.render();
</script>
</body>
</html>

name: "ADR — Architecture Decision Record"
description: Record an architectural decision with context, options, and consequences
title: "[ADR-XXX] "
labels: ["type:adr", "agent:architect"]
body:
  - type: markdown
    attributes:
      value: "## Architecture Decision Record"

  - type: dropdown
    id: status
    attributes:
      label: Status
      options:
        - Proposed
        - Accepted
        - Superseded
        - Deprecated
        - Rejected
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Context
      description: What is the issue motivating this decision, and any constraints?
    validations:
      required: true

  - type: textarea
    id: decision
    attributes:
      label: Decision
      description: What is the change being proposed or accepted?
    validations:
      required: true

  - type: textarea
    id: consequences
    attributes:
      label: Consequences
      description: What becomes easier or more difficult as a result of this decision?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: What other options were evaluated?

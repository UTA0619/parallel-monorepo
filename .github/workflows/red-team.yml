name: Weekly Red Team

on:
  schedule:
    - cron: '0 10 * * 1'  # Monday 10am UTC
  workflow_dispatch:

jobs:
  red-team:
    name: Adversarial Test Suite
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Run adversarial tests
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          pip install -r services/crisis-layer/requirements.txt
          python scripts/red-team/run_adversarial.py
      - name: Upload red team report
        uses: actions/upload-artifact@v4
        with:
          name: red-team-report-${{ github.run_id }}
          path: scripts/red-team/output/
      - name: Create issue if failures found
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue create \
            --repo ${{ github.repository }} \
            --title "[P0] Red Team failures — $(date -u +%Y-%m-%d)" \
            --body "Weekly red team run detected failures. See run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            --label "type:bug,priority:p0,agent:redteam"
